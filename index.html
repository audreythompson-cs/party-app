<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>party-app</title>
    <script>
      window.addEventListener('error', function(e) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.background = '#ef4444';
        errorDiv.style.color = 'white';
        errorDiv.style.padding = '12px';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.fontSize = '13px';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.wordBreak = 'break-all';
        errorDiv.style.boxShadow = '0 4px 6px -1px rgba(0,0,0,0.1)';
        errorDiv.innerHTML = '<strong>App Error:</strong> ' + e.message + '<br/><small>at ' + e.filename.split("/").pop() + ':' + e.lineno + '</small>';
        document.body.appendChild(errorDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
